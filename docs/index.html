<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinestat | Data-Driven Cinema</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--accent-color);
        }

        p {
            font-size: 1.2rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.875rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Coming Soon</div>
        <h1>Cine<span>stat</span></h1>
        <p>Your portal for cinematic statistics and data visualization. We're currently building something special behind the scenes.</p>
    </div>

    <footer>
        &copy; 2026 Cinestat.org • Hosted on GitHub Pages
    </footer>

</body>
</html>
